<div id="wrap">
    <canvas id="gc"></canvas>
    <button id="settings-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54A.48.48 0 0 0 13.92 2h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.49.49 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
    </button>
    <button id="stats-btn" aria-label="Stats">
        <svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
    </button>
    <div id="settings-overlay">
        <div class="card">
            <h2 style="margin-bottom:18px">Settings</h2>
            <div class="toggle-row">
                <span class="toggle-label">Sounds</span>
                <button class="toggle on" id="tog-sound" aria-label="Toggle sound"></button>
            </div>
            <div class="slider-row" id="vol-row">
                <span class="toggle-label">Volume</span>
                <input type="range" id="vol-slider" class="vol-slider" min="0" max="100" value="80">
            </div>
            <div class="toggle-row">
                <span class="toggle-label">Vibration</span>
                <button class="toggle on" id="tog-vib" aria-label="Toggle vibration"></button>
            </div>
            <div class="toggle-row">
                <span class="toggle-label">Dark Mode</span>
                <button class="toggle" id="tog-dark" aria-label="Toggle dark mode"></button>
            </div>
            <a href="https://hellenicdev.github.io/privacy-policy.html?utm_source=https://hellenicdev.github.io/100-jumps/" class="toggle-row legal-row" style="text-decoration:none; color:inherit">
                <span class="toggle-label">Privacy &amp; Terms</span>
                <span style="font-size:18px; color:#7C8AA5; line-height:1">›</span>
            </a>
            <button class="btn btn-main" id="settings-done" style="margin-top:18px">Done</button>
        </div>
    </div>
    <div id="stats-overlay">
        <div class="card">
            <h2 id="stats-title" style="margin-bottom:20px">Stats</h2>
            <div class="stats-section" id="stats-run-section" style="display:none">
                <div class="stats-section-title">Since last win</div>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-value" id="stat-cr-attempts">0</div><div class="stat-label">Attempts</div></div>
                    <div class="stat-item" id="stat-cr-best-wrap"><div class="stat-value" id="stat-cr-best">–</div><div class="stat-label">Best</div></div>
                </div>
            </div>
            <div class="stats-section">
                <div class="stats-section-title">All-time</div>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-value" id="stat-at-attempts">0</div><div class="stat-label">Attempts</div></div>
                    <div class="stat-item" id="stat-at-best-wrap"><div class="stat-value" id="stat-at-best">–</div><div class="stat-label">Best</div></div>
                </div>
            </div>
            <div class="stats-section" style="border-bottom:none;padding-bottom:0">
                <div class="stats-section-title">Trophies</div>
                <div class="trophy-grid" id="trophy-grid"></div>
            </div>
            <button class="btn btn-main" id="stats-done" style="margin-top:18px">Done</button>
        </div>
    </div>
    <div id="level-select">
        <div class="card">
            <div class="ls-wrap">
                <button class="ls-arrow" id="ls-prev" aria-label="Previous level">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                <div class="ls-card">
                    <div class="ls-image" id="ls-image">
                        <svg id="ls-char" viewBox="0 0 60 60" width="80" height="80">
                            <rect width="60" height="60" rx="12" id="ls-char-body"/>
                            <circle cx="18" cy="25" r="8" fill="#fff"/>
                            <circle cx="42" cy="25" r="8" fill="#fff"/>
                            <circle cx="15" cy="25" r="4" fill="#312e81" id="ls-pupil-l"/>
                            <circle cx="39" cy="25" r="4" fill="#312e81" id="ls-pupil-r"/>
                            <path d="M22 42 Q30 42 38 42" stroke="#312e81" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        </svg>
                        <div class="ls-lock-overlay" id="ls-lock" style="display:none">
                            <div class="ls-lock-icon">🔒</div>
                            <div class="ls-lock-text">Beat Classic to unlock</div>
                        </div>
                    </div>
                    <div class="ls-title" id="ls-title">Jump Stack</div>
                </div>
                <button class="ls-arrow" id="ls-next" aria-label="Next level">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59 10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
                </button>
            </div>
            <div class="ls-dots" id="ls-dots"></div>
            <button class="btn btn-main" id="ls-play" style="margin-top:20px">Play Now</button>
        </div>
    </div>
    <div id="modal">
        <div class="card">
            <div class="modal-avatar" id="modal-avatar">
                <svg viewBox="0 0 60 60">
                    <rect id="av-body" width="60" height="60" rx="12" fill="#6366f1"/>
                    <circle cx="18" cy="25" r="8" fill="#fff"/>
                    <circle cx="42" cy="25" r="8" fill="#fff"/>
                    <circle id="av-pupil-l" cx="18" cy="25" r="4" fill="#312e81"/>
                    <circle id="av-pupil-r" cx="42" cy="25" r="4" fill="#312e81"/>
                    <path id="av-mouth" d="M22 42 Q30 42 38 42" stroke="#312e81" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <p id="mbrand" class="modal-brand"></p>
            <h2 id="mt"></h2>
            <p id="ms"></p>
            <p id="mdetail" class="modal-detail"></p>
            <button class="btn btn-main" id="mb" aria-label="main"></button>
            <button class="btn btn-ghost" id="mb-levels" style="display:none" aria-label="ghost">Change Level</button>
        </div>
    </div>
    <div id="bz-footer">Created by <a href="https://hellenicdev.github.io">HellenicDev</a></div>
</div>
<script src="script.js" defer></script>
